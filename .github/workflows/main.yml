name: .NET CI - Testes Unitários

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restaurar Dependências
      run: dotnet restore Back.PersonalFinanceManagement/Back.PersonalFinanceManagement.slnx

    - name: Compilar
      run: dotnet build Back.PersonalFinanceManagement/Back.PersonalFinanceManagement.slnx --no-restore

    - name: Executar Testes Unitários
      run: dotnet test Back.PersonalFinanceManagement/Back.PersonalFinanceManagement.slnx --no-build --verbosity normal
